default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

development:
  <<: *default
  database: peoplebook_development

test:
  <<: *default
  database: PeopleBook_test

production:
  <<: *default
  database: PeopleBook_production
  username: PeopleBook
  password: <%= ENV["PEOPLEBOOK_DATABASE_PASSWORD"] %>
